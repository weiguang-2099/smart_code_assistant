name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit lands on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend-fastapi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-fastapi/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          # Lint/format tools not declared in requirements.txt - install ad-hoc for CI.
          pip install ruff pytest-timeout

      - name: Lint with Ruff
        run: ruff check app tests

      - name: Run tests with coverage
        env:
          FASTAPI_ENV: testing
          DATABASE_URL: mysql+aiomysql://ci:ci@localhost:3306/ci_test
          SECRET_KEY: ci-secret-key-for-tests-only
          ZHIPUAI_API_KEY: ci-test-key
          DATALAB_API_KEY: ci-test-key
          NEO4J_PASSWORD: ci-test-password
        run: |
          pytest tests/ \
            --cov \
            --cov-report=term \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=55 \
            --timeout=60 \
            --timeout-method=thread \
            -x

      - name: Upload coverage report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend-fastapi/htmlcov/
          retention-days: 14

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: backend-fastapi/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend:
    name: Frontend - typecheck, lint, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Lint
        # Fails on errors; warnings are tolerated (the rules-of-hooks family
        # is enforced as errors via eslint.config.js, the rest are warnings
        # that document legacy patterns we plan to refactor).
        run: npm run lint

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Run unit tests
        run: npm test -- --reporter=default --test-timeout=30000

      - name: Build
        run: npm run build

  evals-smoke:
    name: Evals - retrieval smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/test-password
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      chromadb:
        image: chromadb/chroma:latest
        ports:
          - 8001:8000
        options: >-
          --health-cmd "curl -f http://localhost:8000/api/v1/heartbeat || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend-fastapi/requirements.txt
      - name: Cache HuggingFace bge model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-bge-small-zh-v1.5-${{ runner.os }}
      - name: Install backend deps
        working-directory: backend-fastapi
        run: pip install -r requirements.txt
      - name: Eval unit tests
        run: pytest evals/tests/ -v
      - name: Run smoke eval
        env:
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: test-password
          CHROMADB_HOST: localhost
          CHROMADB_PORT: "8001"
          ZHIPUAI_API_KEY: ci-test-key
          SECRET_KEY: ci-secret-key-for-tests-only
        run: |
          python -m evals.run \
            --golden evals/golden_set/mini_fixture.jsonl \
            --index-corpus evals/fixtures/mini_repo
      - name: Upload evals results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evals-results
          path: evals/results/*.json
          retention-days: 30
