<!DOCTYPE html>
<html>
<head>
    <title>Document API Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        button {
            padding: 10px 20px;
            margin: 10px 5px;
            background: #0e639c;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #1177bb;
        }
        pre {
            background: #252526;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
        }
        .section {
            margin: 20px 0;
            border: 1px solid #3c3c3c;
            padding: 15px;
            border-radius: 4px;
        }
        .error {
            color: #f48771;
        }
        .success {
            color: #4ec9b0;
        }
        textarea {
            width: 100%;
            height: 400px;
            background: #1e1e1e;
            color: #d4d4d4;
            border: 1px solid #3c3c3c;
            padding: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <h1>Document API Test Tool</h1>
    
    <div class="section">
        <h2>1. Get Your Token</h2>
        <p>Open browser DevTools (F12) → Application → Local Storage → find "token"</p>
        <input type="text" id="token" placeholder="Paste your token here" style="width: 500px; padding: 8px;">
        <button onclick="saveToken()">Save Token</button>
        <span id="tokenStatus"></span>
    </div>

    <div class="section">
        <h2>2. Test API</h2>
        <label>Document ID: <input type="number" id="docId" value="6" style="width: 80px; padding: 5px;"></label>
        <button onclick="testAPI()">Fetch Document</button>
        <div id="apiResult"></div>
    </div>

    <div class="section">
        <h2>3. View Markdown Content</h2>
        <div id="markdownInfo"></div>
        <textarea id="markdownContent" readonly></textarea>
    </div>

    <script>
        let savedToken = localStorage.getItem('testToken') || '';
        if (savedToken) {
            document.getElementById('token').value = savedToken;
            document.getElementById('tokenStatus').textContent = '✓ Token loaded';
            document.getElementById('tokenStatus').className = 'success';
        }

        function saveToken() {
            const token = document.getElementById('token').value;
            if (token) {
                localStorage.setItem('testToken', token);
                savedToken = token;
                document.getElementById('tokenStatus').textContent = '✓ Token saved';
                document.getElementById('tokenStatus').className = 'success';
            }
        }

        async function testAPI() {
            const docId = document.getElementById('docId').value;
            const resultDiv = document.getElementById('apiResult');
            const markdownInfo = document.getElementById('markdownInfo');
            const markdownTextarea = document.getElementById('markdownContent');

            if (!savedToken) {
                resultDiv.innerHTML = '<p class="error">Please enter and save your token first</p>';
                return;
            }

            resultDiv.innerHTML = '<p>Loading...</p>';

            try {
                const response = await fetch(`http://localhost:8000/api/v1/documents/${docId}`, {
                    headers: {
                        'Authorization': `Bearer ${savedToken}`
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                
                // Show API response structure
                resultDiv.innerHTML = `
                    <p class="success">✓ API Call Successful</p>
                    <pre>${JSON.stringify(data, null, 2).substring(0, 500)}...</pre>
                `;

                // Check for markdown content
                if (data.current_version && data.current_version.markdown_content) {
                    const markdown = data.current_version.markdown_content;
                    markdownInfo.innerHTML = `
                        <p class="success">✓ Markdown content found!</p>
                        <p>Length: ${markdown.length} characters</p>
                        <p>Lines: ${markdown.split('\\n').length}</p>
                    `;
                    markdownTextarea.value = markdown;
                } else {
                    markdownInfo.innerHTML = '<p class="error">✗ No markdown content in response</p>';
                    markdownTextarea.value = '';
                }

                // Log full response to console
                console.log('Full API Response:', data);
                console.log('Markdown content:', data.current_version?.markdown_content);

            } catch (error) {
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
                markdownInfo.innerHTML = '';
                markdownTextarea.value = '';
            }
        }
    </script>
</body>
</html>
